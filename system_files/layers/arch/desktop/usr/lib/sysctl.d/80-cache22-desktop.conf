# Desktop/gaming tweaks beyond the cache22 container baseline
# (/usr/lib/sysctl.d/70-cache22-containers.conf). Loaded later
# (80-*) so vm.max_map_count overrides the 262144 baseline with
# Steam/Proton's recommended 2147483642 (CS2, Star Citizen, etc.
# hit the lower limit). split_lock_mitigate=0 is the Bazzite gaming
# default — disables kernel mitigation that would crash games using
# atomic split locks (Easy Anti-Cheat-protected titles).

kernel.split_lock_mitigate  = 0
vm.max_map_count            = 2147483642

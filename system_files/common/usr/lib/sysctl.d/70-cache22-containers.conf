# Container / incus / podman host tuning, applied to ALL cache22
# variants so containers run cleanly out of the box on KDE or server.
# Values from the Incus production-deployment recommendations:
#   https://linuxcontainers.org/incus/docs/main/reference/server_settings/
# Variant-specific tweaks (server: pid_max, conntrack; desktop:
# Steam's vm.max_map_count override) live in 80-*.conf and override
# any matching keys here via lexicographic load order.

fs.aio-max-nr                       = 524288
fs.inotify.max_queued_events        = 1048576
fs.inotify.max_user_instances       = 1048576
fs.inotify.max_user_watches         = 1048576
kernel.dmesg_restrict               = 1
kernel.keys.maxbytes                = 2000000
kernel.keys.maxkeys                 = 2000
net.core.bpf_jit_limit              = 1000000000
net.ipv4.neigh.default.gc_thresh3   = 8192
net.ipv6.neigh.default.gc_thresh3   = 8192
vm.max_map_count                    = 262144

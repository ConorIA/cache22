# cache22 dracut config — bootc/ostree integration + base-img trimming.
# Lives in /usr/lib/dracut/dracut.conf.d so it is read by every dracut run
# (scripts/generate-initramfs.sh at build, build-user-initrd at runtime).
# Per-machine additions go in /etc/dracut.conf.d (read on top of this).

# Output format: zstd-compressed, deterministic across rebuilds.
# Reproducibility is important for OCI layer dedup and rechunking.
compress="zstd"
do_strip="yes"
hostonly="no"
hostonly_cmdline="no"

# Pin the library search to the 64-bit dirs. cachyos enables multilib, so
# /usr/lib32 is in ld.so.conf, and dracut's auto-detected libdirs would pull a
# full 32-bit copy of libcurl + its closure (ostree links libcurl) into the
# initramfs (~18 MB) with nothing 32-bit to use it. Setting libdirs here
# disables that auto-detection (dracut-functions _detect_library_directories).
# Everything 64-bit lives in /usr/lib (/lib and /usr/lib64 symlink to it).
libdirs="/usr/lib /lib"

# Microcode ships as a separate img the UKI builder prepends (built once by
# generate-initramfs.sh, kernel-independent), not baked into the base img — so
# a microcode bump no longer re-pulls the whole initramfs layer. Both Intel
# and AMD are shipped; the CPU applies whichever vendor matches.
early_microcode="no"

# Modules required for bootc + ostree. ostree-prepare-root sets up
# the stateroot/deploy hardlink farm as the new root before switch_root.
#
# bootc's upstream dracut module declares check()=255 ("never installed
# by default") which dracut 110 honors even with add_dracutmodules+= or
# --force-add. patch-ostree-dracut.sh rewrites check() to return 0.
add_dracutmodules+=" bootc ostree systemd crypt dm "

# Out-of-tree / DKMS modules (nvidia, the realtek/intel NIC DKMS, etc.) are
# excluded from the base img by the dynamic 20-cache22-omit-dkms.conf that
# generate-initramfs.sh writes. The root needs no GPU or network: simpledrm/
# efifb drives the early console and the real drivers load from the root via
# udev after switch_root.

# Filesystems we may need at boot
filesystems+=" btrfs xfs ext4 "

# Trim everything not needed to reach root + unlock LUKS. cache22 boots
# btrfs/xfs/ext4 directly on a partition, optionally over LUKS/dm-crypt
# (passphrase or TPM2), so none of these are on the boot path:
#   iscsi/nfs/cifs          network root (cache22 is local-only)
#   plymouth                swallowed LUKS prompts; ask-password uses the console
#   dash                    bash is the initramfs shell
#   zfs                     never a ZFS root
#   modsign                 module signature enforcement is off (SIG_FORCE unset)
#   lvm/mdraid/nvdimm       cache22 installs on none of these (may return as imgs)
#   resume                  no hibernation (may return as a separate img)
#   fido2/pkcs11            non-default LUKS unlock (re-add via /etc/dracut.conf.d)
#   hwdb                    udev hardware DB, not needed to find/unlock root
#   virtfs/virtiofs/qemu-net  VM share/net, not the boot path
#   systemd-battery-check   laptop courtesy, not boot-critical
omit_dracutmodules+=" iscsi nfs cifs dash plymouth zfs modsign lvm mdraid nvdimm resume fido2 pkcs11 hwdb virtfs virtiofs qemu-net systemd-battery-check "

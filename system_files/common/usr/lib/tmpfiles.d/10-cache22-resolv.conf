# cache22: at first boot, replace any /etc/resolv.conf NetworkManager
# might write (mode 0700 root by default in some configs, breaks
# distrobox/podman with 'open /etc/resolv.conf: permission denied')
# with a symlink to systemd-resolved's stub. Combined with
# /etc/NetworkManager/conf.d/10-cache22-resolved.conf which sets
# dns=systemd-resolved, NM hands DNS to resolved and leaves the
# symlink alone.
#
# Done at runtime not build time because /etc/resolv.conf is a
# bind-mount during the container build (so 'ln -sf' fails with
# "Device or resource busy").
L+ /etc/resolv.conf - - - - /run/systemd/resolve/stub-resolv.conf

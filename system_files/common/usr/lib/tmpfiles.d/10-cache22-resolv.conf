# Point /etc/resolv.conf at systemd-resolved's uplink list: the real upstream
# nameservers, not the 127.0.0.53 stub. The stub is a loopback address that a
# container network namespace cannot reach, so bridged podman and boot-time
# image builds fail to resolve through it. The uplink servers are real
# addresses that work from any namespace. The symlink is also world-readable,
# unlike the per-instance resolv.conf NetworkManager writes mode 0700 root, so
# rootless containers can read it.
#
# Created at runtime rather than build time because /etc/resolv.conf is a bind
# mount during the image build, where 'ln -sf' fails with "Device or resource
# busy".
L+ /etc/resolv.conf - - - - /run/systemd/resolve/resolv.conf

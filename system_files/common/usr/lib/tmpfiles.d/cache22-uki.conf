d /var/lib/cache22         0755 root root -
d /var/lib/cache22/sbkey   0700 root root -
d /etc/cache22             0755 root root -

# /usr/local → /var/usrlocal redirect; recreate the standard subdirs so
# `./configure --prefix=/usr/local && make install` workflows have
# somewhere to land.
d /var/usrlocal            0755 root root -
d /var/usrlocal/bin        0755 root root -
d /var/usrlocal/sbin       0755 root root -
d /var/usrlocal/etc        0755 root root -
d /var/usrlocal/include    0755 root root -
d /var/usrlocal/lib        0755 root root -
d /var/usrlocal/man        0755 root root -
d /var/usrlocal/share      0755 root root -
d /var/usrlocal/share/man  0755 root root -
d /var/usrlocal/games      0755 root root -
d /var/usrlocal/src        0755 root root -

# /opt → /var/opt redirect for third-party app installers.
d /var/opt                 0755 root root -

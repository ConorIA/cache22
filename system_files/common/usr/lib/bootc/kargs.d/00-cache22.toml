# Default kernel cmdline kargs for cache22. Applied by bootc to every
# BLS entry it generates and preserved across `bootc upgrade`. Users
# override per-host with `bootc kargs` or by editing
# /boot/loader/entries/*.conf directly.
#
# Adding `console=` entries here causes systemd's getty-generator to
# instantiate serial-getty@<tty>.service. Don't add a serial console
# unless the target hardware has one connected, or agetty respawn-
# loops on the unattached port.
kargs = [
    "rw",
    "console=tty0",
]
match-architectures = ["x86_64"]

# cache22-reboot — persistent preferences.
#
# When the staged deploy's kernel matches the booted kernel, cache22-reboot
# defaults to soft-reboot (~5 sec, network connections survive). To opt out
# of soft-reboot entirely (e.g. distrust new code), set:
#   SOFT_REBOOT=never
SOFT_REBOOT=auto

# Strategy when a kernel change is detected (soft-reboot not possible):
#   hard   — full system reboot through firmware POST + bootloader.
#            Slowest but works on all hardware.
#   kexec  — kexec into the staged UKI. Faster (~10-30 sec saved) but
#            some hardware doesn't kexec cleanly (GPU/ACPI re-init).
#
# CLI flags (--soft, --kexec, --hard) override this for a single invocation.
KERNEL_CHANGE_STRATEGY=hard

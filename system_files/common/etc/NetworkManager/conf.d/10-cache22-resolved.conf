# Hand DNS off to systemd-resolved so NetworkManager feeds it the upstream
# nameservers instead of writing its own per-instance /etc/resolv.conf mode
# 0700 root (unreadable by rootless containers). resolved publishes those
# servers in /run/systemd/resolve/resolv.conf, which 10-cache22-resolv.conf
# (tmpfiles) links /etc/resolv.conf to.
[main]
dns=systemd-resolved

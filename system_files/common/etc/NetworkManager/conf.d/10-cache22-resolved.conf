# Hand DNS off to systemd-resolved. This makes /etc/resolv.conf the
# symlink to /run/systemd/resolve/stub-resolv.conf that resolved
# manages, instead of a per-instance file NetworkManager writes mode
# 0700 root (which broke distrobox/podman because /etc/resolv.conf
# wasn't world-readable for rootless containers building their own).
[main]
dns=systemd-resolved

# cache22 dracut config — bootc/ostree integration.
# All initramfs builds use these settings via scripts/generate-initramfs.sh.

# Output format: zstd-compressed, deterministic across rebuilds.
# Reproducibility is important for OCI layer dedup and rechunking.
compress="zstd"
do_strip="yes"
hostonly="no"
hostonly_cmdline="no"

# Modules required for bootc + ostree. ostree-prepare-root sets up
# the stateroot/deploy hardlink farm as the new root before switch_root.
#
# bootc's upstream dracut module declares check()=255 ("never installed
# by default") which dracut 110 honors even with add_dracutmodules+= or
# --force-add. patch-ostree-dracut.sh rewrites check() to return 0.
add_dracutmodules+=" bootc ostree systemd crypt dm "

# Drivers we want available in the initramfs even if dracut wouldn't
# auto-detect them (since hostonly=no).
add_drivers+=" nvidia nvidia_modeset nvidia_uvm nvidia_drm "

# Native KMS drivers for the common GPU families. Having the real driver
# in the initramfs lets it claim the framebuffer (aperture handover from
# simpledrm) before the graphical session starts, so kwin/Wayland gets a
# proper KMS device instead of the EFI simple-framebuffer. Each binds only
# when its hardware is present; the rest are inert. Preferred over
# blacklisting simpledrm, which would leave GPUs with no native driver
# (some VMs, exotic hardware) without any console.
add_drivers+=" i915 xe amdgpu radeon nouveau "

# Filesystems we may need at boot
filesystems+=" btrfs xfs ext4 "

# Omit modules we never need. plymouth is omitted because it didn't
# work reliably and tended to swallow LUKS unlock prompts; without it
# systemd-ask-password renders directly on the console where the user
# can actually see it.
omit_dracutmodules+=" iscsi nfs cifs dash plymouth "

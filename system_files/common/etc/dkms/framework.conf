# DKMS module signing — disabled.
#
# Modules built during pacman -S (broadcom-wl on cachy; nvidia-open,
# r8125 on arch) inherit trust from the parent UKI's Authenticode
# signature: PCR 11 covers the entire .initrd section, so any
# tampering with a module inside the initramfs invalidates the TPM2
# signed-PCR policy that gates LUKS unseal. Per-module signatures
# are not load-bearing.
#
# Why explicit "off" rather than left blank:
#   With sign_tool/mok_signing_key unset, dkms auto-generates a
#   per-build /var/lib/dkms/mok.key/pub and signs anyway. The signed
#   .ko bytes (and the initramfs that embeds them) then differ
#   between builds, defeating layer dedup so every cache22-update
#   re-pulls those layers even when no upstream package changed.
#   try_sign_modules='false' short-circuits dkms's signing logic
#   entirely (dkms.in: "Module signing is disabled by policy").
#
# To opt back in for runtime (post-install) module builds — e.g.
# kernel upgrades that rebuild DKMS modules — uncomment the lines
# below to sign with the per-machine sbctl key. Note this only
# affects modules built AFTER install; the image's bundled modules
# stay unsigned (they don't need signing — see above).
#try_sign_modules='true'
#mok_signing_key="/var/lib/cache22/sbkey/db.key"
#mok_certificate="/var/lib/cache22/sbkey/db.pem"

try_sign_modules='false'

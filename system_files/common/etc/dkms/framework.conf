# Sign DKMS-built modules with the cache22 SB key (mounted as a build
# secret at /run/secrets/sbkey). The cache22 cert at
# /usr/share/cache22/secureboot.crt is enrolled as MOK at install time,
# so modules signed here trust through the same chain as vmlinuz.
#
# When the secret is absent (fork-PR builds), DKMS falls back to its
# default and may generate a per-build /var/lib/dkms/mok.key — that's
# fine for unsigned test builds.
mok_signing_key="/run/secrets/sbkey"
mok_certificate="/usr/share/cache22/secureboot.crt"

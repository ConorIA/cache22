# DKMS module signing.
#
# Image build time: no per-machine SB key exists yet (it's generated
# by sbctl at install). DKMS uses its own default per-build key for
# any modules built during pacman -S, which we don't try to verify —
# those modules ride the parent UKI's Authenticode signature at boot
# (PCR 11 covers the entire .initrd section, so any tampering with a
# module inside the initramfs breaks the TPM2 signed-PCR policy that
# gates LUKS unseal).
#
# Runtime: modules built locally by `dkms install` (e.g. after a kernel
# upgrade) likewise inherit trust from the UKI rebuilt by
# /usr/libexec/cache22/resign-uki. Per-module signature verification
# is therefore optional defense-in-depth rather than load-bearing.
# To opt in after install, point the lines below at the per-machine
# sbctl key:
#
#mok_signing_key="/var/lib/cache22/sbkey/db.key"
#mok_certificate="/var/lib/cache22/sbkey/db.pem"

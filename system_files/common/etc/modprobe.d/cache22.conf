# cache22 — kernel module blacklist + tuning.

# Blacklist the in-tree ntfs3 driver. linux-cachyos-bore-lto ships an
# improved ntfs module that is preferred for read+write reliability.
# Without this blacklist, ntfs3 may be auto-bound to NTFS partitions
# instead of the cachyos-preferred ntfs.
blacklist ntfs3
install ntfs3 /bin/false

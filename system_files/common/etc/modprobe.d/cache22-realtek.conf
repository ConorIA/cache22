# r8169 is the in-tree Realtek driver. It claims the same PCI IDs as
# the vendor's out-of-tree r8125 (the one cache22 ships pre-built per
# kernel). When both are present, the binding races; r8125 usually
# wins, but a future boot with a different module load order could
# silently regress to r8169 — which is flaky on RTL8125 2.5GbE chips
# (link drops, throughput cliffs, watchdog timeouts).
#
# Blacklist r8169 so udev's PCI-match doesn't auto-load it, and use
# install /bin/false so anything else (e.g. dracut's hostonly logic)
# can't pull it in either.

blacklist r8169
install r8169 /bin/false

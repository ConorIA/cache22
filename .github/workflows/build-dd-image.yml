name: Build cache22 DD image (prebuilt disk)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 0'
  push:
    branches: [main]
    paths:
      - 'installer/build-dd-image.sh'
      - 'installer/cache22-install'
      - '.github/workflows/build-dd-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-dd:
    name: Build prebuilt DD image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [arch-server, cachy-server]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free runner disk space
        run: |
          sudo rm -rf \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc \
              /usr/local/.ghcup \
              /usr/local/lib/android \
              /opt/hostedtoolcache
          df -h /

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdisk parted btrfs-progs e2fsprogs util-linux zstd podman

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build DD image
        run: |
          sudo ./installer/build-dd-image.sh \
              --variant "${{ matrix.variant }}" \
              --out "$PWD"

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Push disk image to ghcr.io
        if: github.event_name != 'pull_request'
        env:
          ORAS_USER: ${{ github.actor }}
          ORAS_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMG="cache22-${{ matrix.variant }}-bios.raw.zst"
          REPO="ghcr.io/${{ github.repository_owner }}/cache22-${{ matrix.variant }}-dd"
          DATE=$(date -u +%Y-%m-%d)
          echo "$ORAS_PASS" | oras login ghcr.io -u "$ORAS_USER" --password-stdin
          # Single-layer OCI artifact: the layer IS the disk image, so a
          # client can stream the one blob straight to disk.
          oras push "${REPO}:rolling" \
              --artifact-type application/vnd.cache22.diskimage.v1 \
              --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              "${IMG}:application/octet-stream"
          oras tag "${REPO}:rolling" "iso-${DATE}"
          echo "Pushed ${REPO}:rolling (and :iso-${DATE})"
          echo "  sha256: $(sha256sum "$IMG" | awk '{print $1}')"

name: Build cache22 DD image (prebuilt disk)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 0'
  push:
    branches: [main]
    paths:
      - 'installer/build-dd-image.sh'
      - 'installer/cache22-install'
      - '.github/workflows/build-dd-image.yml'

permissions:
  contents: write
  packages: read

jobs:
  build-dd:
    name: Build prebuilt DD image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [arch-server, cachy-server]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free runner disk space
        run: |
          sudo rm -rf \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc \
              /usr/local/.ghcup \
              /usr/local/lib/android \
              /opt/hostedtoolcache
          df -h /

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdisk parted btrfs-progs e2fsprogs util-linux zstd podman

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build DD image
        run: |
          sudo ./installer/build-dd-image.sh \
              --variant "${{ matrix.variant }}" \
              --out "$PWD"

      - name: Compute artifact info
        id: info
        run: |
          IMG="cache22-${{ matrix.variant }}-bios.raw.zst"
          DATE=$(date -u +%Y-%m-%d)
          SIZE=$(du -h "$IMG" | cut -f1)
          SHA=$(sha256sum "$IMG" | awk '{print $1}')
          echo "img=$IMG"   >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"   >> "$GITHUB_OUTPUT"
          echo "tag=iso-$DATE" >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.info.outputs.img }}
          path: ${{ steps.info.outputs.img }}
          retention-days: 14

      - name: Upload to GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMG: ${{ steps.info.outputs.img }}
          TAG: ${{ steps.info.outputs.tag }}
          SIZE: ${{ steps.info.outputs.size }}
          SHA: ${{ steps.info.outputs.sha }}
        run: |
          # The ISO / kexec workflows own release creation; only create a
          # stub if neither has run yet for today's tag.
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release create "$TAG" \
                  --repo "$GITHUB_REPOSITORY" \
                  --title "cache22 installer release ($TAG)" \
                  --notes "Release auto-created by build-dd-image."
          fi
          gh release upload "$TAG" "$IMG" \
              --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded $IMG ($SIZE, sha256 $SHA) to release $TAG"

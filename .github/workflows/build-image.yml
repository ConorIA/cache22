name: Build cache22 image

on:
  schedule:
    # Daily at 18:00 UTC. CachyOS rebuilds its base image at 13:41 UTC,
    # so this cadence picks up their freshest layers.
    - cron: '0 18 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'packages/**'
      - 'system_files/**'
      - 'scripts/**'
      - '.github/workflows/build-image.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/cache22

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # cachy family (CachyOS bore-lto kernel + repos)
          - { variant: cachy-server, family: cachy, base_image: docker.io/cachyos/cachyos-v3 }
          - { variant: cachy-kde,    family: cachy, base_image: docker.io/cachyos/cachyos-v3 }
          - { variant: cachy-gnome,  family: cachy, base_image: docker.io/cachyos/cachyos-v3 }
          # arch family (vanilla Arch + mainline linux)
          - { variant: arch-server,  family: arch,  base_image: docker.io/archlinux }
          - { variant: arch-kde,     family: arch,  base_image: docker.io/archlinux }
          - { variant: arch-gnome,   family: arch,  base_image: docker.io/archlinux }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free runner disk space
        # ubuntu-latest ships with ~50 GB of pre-installed toolchains
        # (Android SDK, .NET, Haskell, Swift, browser caches, etc.) we
        # don't use. Removing them roughly doubles free disk during the
        # buildah pass and eliminates the occasional nightly failure of
        # the form `io: read/write on closed pipe` during the final
        # commit step (resource exhaustion under parallel-job pressure).
        run: |
          echo "==> Free space before cleanup:"
          df -h /
          sudo rm -rf \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc \
              /usr/local/.ghcup \
              /usr/local/lib/android \
              /opt/hostedtoolcache \
              /usr/local/share/powershell \
              /usr/local/share/chromium \
              /usr/local/share/boost \
              /opt/microsoft \
              2>/dev/null || true
          sudo apt-get autoremove -y -qq >/dev/null 2>&1 || true
          sudo apt-get clean
          echo "==> Free space after cleanup:"
          df -h /

      - name: Install buildah + skopeo + python3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq buildah skopeo python3 jq

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMG="${REGISTRY}/${IMAGE_REPO,,}-${{ matrix.variant }}"
          DATE_TAG=$(date -u +%Y-%m-%d)
          SHA_TAG=sha-${GITHUB_SHA::7}
          echo "image=${IMG}"               >> "$GITHUB_OUTPUT"
          echo "tag_rolling=${IMG}:rolling" >> "$GITHUB_OUTPUT"
          echo "tag_date=${IMG}:${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${IMG}:${SHA_TAG}"  >> "$GITHUB_OUTPUT"

      - name: Snapshot previous rolling manifest (for upgrade-size diff)
        # Save the layer digests + sizes of the *current* rolling tag before we
        # overwrite it, so the post-push step can compute "what would a user
        # who already has the previous rolling have to download for this update".
        run: |
          mkdir -p /tmp/manifests
          if skopeo inspect --raw "docker://${{ steps.tags.outputs.tag_rolling }}" > /tmp/manifests/previous.json 2>/dev/null; then
            jq '{layer_count: (.layers | length), total_size: ([.layers[].size] | add), digests: [.layers[].digest]}' \
                /tmp/manifests/previous.json > /tmp/manifests/previous.summary.json
            cat /tmp/manifests/previous.summary.json
          else
            echo "(no previous rolling tag — first build)"
            echo '{"layer_count": 0, "total_size": 0, "digests": []}' > /tmp/manifests/previous.summary.json
          fi

      - name: Build raw image (single-layer)
        run: |
          # SOURCE_DATE_EPOCH=0 plumbed to dracut --reproducible, kbuild,
          # gzip, ar, gnu-strip and other tools that honour the standard
          # SDE convention. A fixed value is required for stable layer
          # digests across rebuilds: any per-build value would make
          # every tar entry's mtime differ between builds, defeating
          # bootc's blob-level dedup on incremental upgrades.
          #
          # No SB signing key is mounted: cache22 signs UKIs at runtime
          # on the user's machine with a per-machine key generated by
          # sbctl at install time. CI builds the unsigned kernel +
          # initramfs; the per-deploy UKI is assembled and signed by
          # /usr/libexec/cache22/resign-uki on the installed system.
          #
          # Retry up to 3x on failure. The pre-emptive disk cleanup
          # eliminates the common cause (out-of-space at COMMIT), but
          # transient runner-pool resource pressure can still bite —
          # cheap insurance.
          SDE=0
          for attempt in 1 2 3; do
              echo "==> buildah bud attempt $attempt"
              if sudo buildah bud \
                    --build-arg BASE_IMAGE=${{ matrix.base_image }} \
                    --build-arg VARIANT_FAMILY=${{ matrix.family }} \
                    --build-arg VARIANT=${{ matrix.variant }} \
                    --build-arg SOURCE_DATE_EPOCH="$SDE" \
                    --tag localhost/cache22-${{ matrix.variant }}:raw \
                    -f Containerfile \
                    . ; then
                  echo "==> buildah bud succeeded on attempt $attempt"
                  break
              fi
              if [ "$attempt" = "3" ]; then
                  echo "==> buildah bud failed after 3 attempts"
                  exit 1
              fi
              echo "==> attempt $attempt failed; cleaning up partial state"
              sudo buildah rmi --all --force 2>/dev/null || true
              sudo rm -rf /var/lib/containers/storage/overlay 2>/dev/null || true
              sudo rm -rf /var/lib/containers/storage/overlay-* 2>/dev/null || true
              df -h /
              echo "==> retrying in 30s"
              sleep 30
          done

      - name: Extract var-to-tmpfiles diagnostics
        # Surface the auto-generated /usr/lib/tmpfiles.d/00-cache22-var.conf
        # so we can review what /var content the image is recreating on
        # boot — and notice if it suddenly grows by hundreds of entries
        # because something started writing to /var unexpectedly.
        run: |
          mkdir -p /tmp/diagnostics
          ctr=$(sudo buildah from localhost/cache22-${{ matrix.variant }}:raw)
          mnt=$(sudo buildah mount "$ctr")
          sudo cp "$mnt/usr/lib/tmpfiles.d/00-cache22-var.conf" \
              "/tmp/diagnostics/00-cache22-var-${{ matrix.variant }}.conf" 2>/dev/null || \
              echo "(no 00-cache22-var.conf in image)" > "/tmp/diagnostics/00-cache22-var-${{ matrix.variant }}.conf"
          sudo find "$mnt/usr/share/factory/var" -type f 2>/dev/null \
              | sed "s|$mnt||" | sort > "/tmp/diagnostics/factory-var-${{ matrix.variant }}.list" \
              || true
          echo "==> Generated tmpfiles.d entries: $(grep -cv '^#' /tmp/diagnostics/00-cache22-var-${{ matrix.variant }}.conf || true)"
          echo "==> Factory-var files: $(wc -l < /tmp/diagnostics/factory-var-${{ matrix.variant }}.list 2>/dev/null || echo 0)"
          # Snapshot the installed package set for cross-build diffing.
          # Two outputs from one walk of the pacman db:
          #   pkgs-<variant>.txt           — sorted dir names (used by
          #                                  no-changes detector via cmp)
          #   pkgs-detailed-<variant>.tsv  — name, ver, rel, epoch, size
          #                                  parsed from each desc file
          #                                  (used by package-diff step
          #                                  to report size deltas and
          #                                  distinguish ver vs rel bumps)
          sudo python3 - "$mnt/usr/lib/sysimage/pacman/local" \
                          "/tmp/diagnostics/pkgs-${{ matrix.variant }}.txt" \
                          "/tmp/diagnostics/pkgs-detailed-${{ matrix.variant }}.tsv" <<'PY'
          import os, sys
          db, simple_out, tsv_out = sys.argv[1], sys.argv[2], sys.argv[3]
          rows = []
          for entry in sorted(os.listdir(db)):
              if entry == 'ALPM_DB_VERSION':
                  continue
              desc = os.path.join(db, entry, 'desc')
              if not os.path.isfile(desc):
                  continue
              fields = {}
              key = None
              with open(desc, encoding='utf-8', errors='replace') as f:
                  for line in f:
                      line = line.rstrip('\n')
                      if line.startswith('%') and line.endswith('%'):
                          key = line[1:-1]; fields[key] = []
                      elif key is not None and line != '':
                          fields[key].append(line)
              name = (fields.get('NAME') or [''])[0]
              ver_full = (fields.get('VERSION') or [''])[0]   # may be EPOCH:VER-REL
              size = (fields.get('SIZE') or ['0'])[0]
              if ':' in ver_full:
                  epoch, vr = ver_full.split(':', 1)
              else:
                  epoch, vr = '0', ver_full
              if '-' in vr:
                  ver, rel = vr.rsplit('-', 1)
              else:
                  ver, rel = vr, ''
              rows.append((entry, name, ver, rel, epoch, size))
          with open(simple_out, 'w') as f:
              for r in rows:
                  f.write(r[0] + '\n')
          with open(tsv_out, 'w') as f:
              f.write('name\tver\trel\tepoch\tsize\n')
              for _, name, ver, rel, epoch, size in rows:
                  f.write(f'{name}\t{ver}\t{rel}\t{epoch}\t{size}\n')
          PY
          echo "==> Installed packages: $(wc -l < /tmp/diagnostics/pkgs-${{ matrix.variant }}.txt)"
          # Build metadata — git SHA of the source that produced this
          # image. Combined with pkgs.txt, this is what the no-changes
          # detector compares against the previous build.
          echo "${{ github.sha }}" > "/tmp/diagnostics/git-sha-${{ matrix.variant }}.txt"
          sudo buildah umount "$ctr"
          sudo buildah rm "$ctr"

      - name: Upload var-to-tmpfiles diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: var-tmpfiles-${{ matrix.variant }}
          path: /tmp/diagnostics/
          retention-days: 30

      - name: Download previous build's package list + git SHA
        id: prev
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull the most recent run's diagnostics artifact for this
          # variant. Don't filter --status=success: the diagnostics
          # upload step runs early in the job, before anything that
          # typically fails (rechunk/push), so failed runs usually have
          # valid diagnostics too. Skipping them would mean the "package
          # changes" report measures against a stale baseline from
          # days/weeks ago when most recent runs failed.
          #
          # Walk the recent run list and download from the first one
          # that has the artifact we need.
          mkdir -p /tmp/prev
          mapfile -t RECENT < <(gh run list --workflow=build-image.yml --branch=main \
                  --status=completed --limit=20 \
                  --json databaseId --jq '.[].databaseId' 2>/dev/null || true)
          for run_id in "${RECENT[@]}"; do
              # Skip current run (its artifact doesn't exist yet).
              [[ "$run_id" == "${{ github.run_id }}" ]] && continue
              echo "==> Trying diagnostics from run $run_id"
              if gh run download "$run_id" \
                      --name "var-tmpfiles-${{ matrix.variant }}" \
                      --dir /tmp/prev/ 2>/dev/null; then
                  echo "==> Got diagnostics from run $run_id"
                  break
              fi
          done
          if [ -f "/tmp/prev/pkgs-${{ matrix.variant }}.txt" ]; then
              echo "==> Previous pkgs: $(wc -l < /tmp/prev/pkgs-${{ matrix.variant }}.txt) packages"
          else
              echo "==> No previous pkgs.txt found in last 20 runs — first build or artifacts expired"
          fi

      - name: Detect changes vs previous build
        id: detect
        run: |
          # Skip ghcr push if BOTH the git SHA and the package set are
          # unchanged since the last successful build. Either drift means
          # users would benefit from a new image (source-level changes
          # affect /usr/etc/{os,lsb}-release stamping etc., even if no
          # packages changed; package changes obviously do).
          PREV_PKGS="/tmp/prev/pkgs-${{ matrix.variant }}.txt"
          CUR_PKGS="/tmp/diagnostics/pkgs-${{ matrix.variant }}.txt"
          PREV_SHA_FILE="/tmp/prev/git-sha-${{ matrix.variant }}.txt"
          CUR_SHA="${{ github.sha }}"

          has_changes=true
          reason=""

          if [ ! -f "$PREV_PKGS" ]; then
              reason="no previous pkgs.txt (first build or artifact expired)"
          elif [ ! -f "$PREV_SHA_FILE" ]; then
              reason="no previous git-sha.txt (older artifact format)"
          else
              PREV_SHA=$(tr -d '[:space:]' < "$PREV_SHA_FILE")
              echo "Previous SHA: $PREV_SHA"
              echo "Current SHA:  $CUR_SHA"
              if [ "$PREV_SHA" != "$CUR_SHA" ]; then
                  reason="git SHA changed ($PREV_SHA → $CUR_SHA)"
              elif ! cmp -s "$PREV_PKGS" "$CUR_PKGS"; then
                  reason="package set changed"
              else
                  has_changes=false
                  reason="git SHA AND package set both unchanged"
              fi
          fi

          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "==> has_changes=$has_changes ($reason)"

          # Always write a brief notice to the job summary so the no-push
          # case is obvious in the GH Actions UI.
          if [ "$has_changes" = "false" ]; then
              cat >> "$GITHUB_STEP_SUMMARY" <<EOF

          ## Skipped ghcr push (${{ matrix.variant }})

          - Git SHA unchanged: \`$CUR_SHA\`
          - Package set unchanged
          - The rechunked image would be byte-identical to the prior
            build modulo finalize-image.sh stamps; no value in pushing.
          EOF
          fi

      - name: Restore pkgcache index from previous build
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/cache/restore@v5
        with:
          # Per-variant cache key. Map cache_key → (digest, size, diff_id)
          # for every solo (per-package) layer compressed in a prior
          # build. The actual compressed blobs live in the variant's
          # ghcr.io repo from that prior push; this index just tells the
          # rechunker "you already compressed glibc-2.41-3 yesterday at
          # this digest — skip the zstd pass." Cold start (cache miss
          # here) = full rebuild, populates index for next time.
          path: /tmp/pkgcache.json
          key: pkgcache-${{ matrix.variant }}-v1
          restore-keys: |
            pkgcache-${{ matrix.variant }}-

      - name: Rechunk into ~480 per-package/bucket layers
        if: steps.detect.outputs.has_changes == 'true'
        # Splits the install image into per-package/bucket layers so
        # daily updates only redownload the layers containing changed
        # packages. SOURCE_DATE_EPOCH=0 fixes tar-entry mtimes to a
        # constant: identical input bytes produce identical layer
        # digests across builds, which is what makes incremental
        # bootc upgrades work. The OCI image config "created" field
        # is set separately (--image-created-epoch) to the commit
        # timestamp so `bootc status` shows a real build date.
        #
        # --pkgcache-index points at the restored index. The rechunker
        # consults it for each solo package and skips zstd-19 when the
        # mtree-derived cache key matches an entry from a prior build.
        run: |
          mkdir -p /tmp/rechunked
          CREATED=$(git -C "$GITHUB_WORKSPACE" log -1 --format=%ct)
          sudo python3 scripts/rechunk-cache22.py \
            --src localhost/cache22-${{ matrix.variant }}:raw \
            --dst /tmp/rechunked \
            --source-date-epoch 0 \
            --image-created-epoch "$CREATED" \
            --pkgcache-index /tmp/pkgcache.json

      - name: Push rechunked image to ghcr.io
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          # push-with-cache.py replaces `skopeo copy`. Per layer:
          #   1. HEAD destination repo. Blob there from yesterday → skip.
          #   2. Blob in local OCI dir → upload (cache miss this build).
          #   3. Neither → FATAL (cache lied / ghcr.io GC'd blob).
          # No bytes flow for cache hits. No new ghcr.io infrastructure;
          # the variant's own repo serves as the cache.
          DST_REF="${{ steps.tags.outputs.tag_rolling }}"
          DST_REPO="${DST_REF%:*}"
          DST_REPO="${DST_REPO#ghcr.io/}"
          DST_TAG="${DST_REF##*:}"
          echo "==> Pushing :$DST_TAG to $DST_REPO"
          sudo python3 scripts/push-with-cache.py \
            --src /tmp/rechunked \
            --dst-repo "$DST_REPO" \
            --dst-tag "$DST_TAG" \
            --auth-file "$HOME/.docker/config.json"

          # For the date and sha tags, use `crane tag` — registry-protocol
          # primitive that writes a new manifest reference pointing at the
          # same digest. No blob re-upload, no re-encoding; just a manifest
          # write (a few KB). Three full skopeo copies took ~30 min wall
          # time; this is ~30 min + ~2 sec.
          #
          # Background: skopeo's --additional-tag option silently no-ops on
          # ghcr.io — only the primary destination becomes a real tag, the
          # additional ones never materialise. Per-tag skopeo copies work
          # but each pays a re-encode round-trip. crane tag avoids both
          # problems by speaking the registry protocol directly.
          echo "==> Installing crane"
          curl -fsSL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane

          # crane reads ghcr.io credentials from the same auth file skopeo wrote.
          export DOCKER_CONFIG="$HOME/.docker"

          for tag in "${{ steps.tags.outputs.tag_date }}" "${{ steps.tags.outputs.tag_sha }}"; do
              echo "==> Tagging ${tag##*:}"
              # crane tag IMAGE:OLDTAG NEWTAG  →  copies the manifest reference
              # The first arg is the source image, second is JUST the new tag name.
              crane tag "${{ steps.tags.outputs.tag_rolling }}" "${tag##*:}"
          done

      - name: Save pkgcache index for next build
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/pkgcache.json
          # Run-id-suffixed key keeps each save unique (GHA cache keys
          # are immutable once written). Restore-keys prefix-match on
          # `pkgcache-<variant>-` picks the most recent save.
          key: pkgcache-${{ matrix.variant }}-v1-${{ github.run_id }}

      - name: Inspect pushed image
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          skopeo inspect --raw "docker://${{ steps.tags.outputs.tag_rolling }}" \
            > /tmp/manifests/current.json
          jq '{layer_count: (.layers | length), total_size: ([.layers[].size] | add), config_digest: .config.digest}' \
            /tmp/manifests/current.json

      - name: Compute upgrade-size delta vs previous rolling
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          # What an upgrader who already has the previous rolling would download:
          # the set of new layers minus any whose digest matches a layer they
          # already have. Print as a CI summary.
          python3 <<'PY'
          import json, sys
          prev = json.load(open('/tmp/manifests/previous.summary.json'))
          cur_raw = json.load(open('/tmp/manifests/current.json'))
          prev_digests = set(prev.get('digests', []))
          cur_layers = cur_raw['layers']
          cur_total = sum(l['size'] for l in cur_layers)
          new_layers = [l for l in cur_layers if l['digest'] not in prev_digests]
          new_total = sum(l['size'] for l in new_layers)
          reused = len(cur_layers) - len(new_layers)
          gb = lambda b: f"{b/1024/1024/1024:.2f} GB"
          mb = lambda b: f"{b/1024/1024:.1f} MB"
          summary = f"""
          ## Upgrade-size delta (${{ matrix.variant }})

          - Previous rolling: {prev.get('layer_count', 0)} layers, {gb(prev.get('total_size', 0))}
          - Current  rolling: {len(cur_layers)} layers, {gb(cur_total)}
          - Layers reused:    {reused} / {len(cur_layers)}
          - **New layers:     {len(new_layers)} ({mb(new_total)})**
          - This is what a `bootc upgrade` from the previous rolling will download.
          """
          print(summary)
          # Also write to GitHub Actions step summary
          with open(__import__('os').environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          PY

      - name: Compute package diff vs previous build
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          PREV_TSV="/tmp/prev/pkgs-detailed-${{ matrix.variant }}.tsv"
          CUR_TSV="/tmp/diagnostics/pkgs-detailed-${{ matrix.variant }}.tsv"
          PREV_TXT="/tmp/prev/pkgs-${{ matrix.variant }}.txt"
          CUR_TXT="/tmp/diagnostics/pkgs-${{ matrix.variant }}.txt"
          if [ ! -f "$PREV_TSV" ] && [ ! -f "$PREV_TXT" ]; then
              echo "No previous package snapshot — skipping changelog"
              exit 0
          fi
          python3 - "$PREV_TSV" "$CUR_TSV" "$PREV_TXT" "$CUR_TXT" "${{ matrix.variant }}" <<'PY'
          import os, sys
          prev_tsv, cur_tsv, prev_txt, cur_txt, variant = sys.argv[1:6]

          # Parse pacman db dir name: <pkgname>-<pkgver>-<pkgrel>.
          # pkgname may contain hyphens; pkgver may not (per pacman);
          # pkgrel may contain dots (e.g. CachyOS uses 1.1, 2.3 freely).
          # Split from the right at the last two hyphens.
          def parse_dirname(name):
              parts = name.rsplit('-', 2)
              if len(parts) != 3:
                  return None
              n, v, r = parts
              # VERSION field would carry epoch as EPOCH:VER, but the dir
              # name embeds it the same way. Strip for the epoch column.
              if ':' in v:
                  e, v = v.split(':', 1)
              else:
                  e = '0'
              return n, v, r, e, 0  # size unknown from dir name alone

          def load_tsv(path):
              out = {}
              with open(path) as f:
                  next(f, None)  # header
                  for line in f:
                      cols = line.rstrip('\n').split('\t')
                      if len(cols) < 5: continue
                      name, ver, rel, epoch, size = cols[:5]
                      out[name] = (ver, rel, epoch, int(size or 0))
              return out

          def load_txt(path):
              out = {}
              with open(path) as f:
                  for line in f:
                      line = line.strip()
                      if not line or line == 'ALPM_DB_VERSION': continue
                      r = parse_dirname(line)
                      if r:
                          n, v, rel, e, sz = r
                          out[n] = (v, rel, e, sz)
              return out

          prev = load_tsv(prev_tsv) if os.path.isfile(prev_tsv) else load_txt(prev_txt)
          cur  = load_tsv(cur_tsv)  if os.path.isfile(cur_tsv)  else load_txt(cur_txt)

          added   = sorted(set(cur) - set(prev))
          removed = sorted(set(prev) - set(cur))
          common  = set(cur) & set(prev)

          ver_changed = []   # real version bump (pkgver or epoch differs)
          rel_changed = []   # rebuild only (same pkgver+epoch, pkgrel differs)
          for p in common:
              pv, pr, pe, ps = prev[p]
              cv, cr, ce, cs = cur[p]
              if (pv, pe) != (cv, ce):
                  ver_changed.append(p)
              elif pr != cr:
                  rel_changed.append(p)

          def fmt_ver(v, r, e):
              prefix = f'{e}:' if e and e != '0' else ''
              return f'{prefix}{v}-{r}'

          def _humansize(b):
              s = float(abs(b))
              for unit in ('B','KiB','MiB','GiB'):
                  if s < 1024 or unit == 'GiB':
                      return f'{s:.2f} {unit}'
                  s /= 1024
              return f'{s:.2f} GiB'
          def fmt_size(b):
              return ('+' if b >= 0 else '−') + _humansize(b)
          def fmt_size_abs(b):
              return _humansize(b)

          # Sort upgrades by abs size delta (largest first) so the
          # heavy hitters are on top — that's where layer drift comes
          # from.
          def size_delta(p):
              return cur[p][3] - prev[p][3]
          ver_changed.sort(key=lambda p: (-abs(size_delta(p)), p))
          rel_changed.sort(key=lambda p: (-abs(size_delta(p)), p))

          n_real, n_rebuild = len(ver_changed), len(rel_changed)
          lines = ['', f'## Package changes ({variant})', '']
          if not (added or removed or ver_changed or rel_changed):
              lines.append('_No package-set changes since previous build._')
          else:
              lines.append(
                  f'**{n_real} upgraded, {n_rebuild} rebuilt, '
                  f'{len(added)} added, {len(removed)} removed**'
              )
              total_delta = sum(size_delta(p) for p in ver_changed + rel_changed) \
                            + sum(cur[p][3] for p in added) \
                            - sum(prev[p][3] for p in removed)
              lines.append('')
              lines.append(f'Net installed-size change: **{fmt_size(total_delta)}**')
              lines.append('')

              if ver_changed:
                  lines.append('<details open><summary>Upgraded (pkgver changed) — sorted by size delta</summary>\n')
                  lines.append('| Δ size | package | from | to |')
                  lines.append('|---:|---|---|---|')
                  for p in ver_changed:
                      pv,pr,pe,ps = prev[p]; cv,cr,ce,cs = cur[p]
                      lines.append(
                          f'| {fmt_size(cs - ps)} | `{p}` | '
                          f'{fmt_ver(pv,pr,pe)} | {fmt_ver(cv,cr,ce)} |'
                      )
                  lines.append('\n</details>')

              if rel_changed:
                  lines.append('<details><summary>Rebuilt (pkgrel only) — sorted by size delta</summary>\n')
                  lines.append('| Δ size | package | from | to |')
                  lines.append('|---:|---|---|---|')
                  for p in rel_changed:
                      pv,pr,pe,ps = prev[p]; cv,cr,ce,cs = cur[p]
                      lines.append(
                          f'| {fmt_size(cs - ps)} | `{p}` | '
                          f'{fmt_ver(pv,pr,pe)} | {fmt_ver(cv,cr,ce)} |'
                      )
                  lines.append('\n</details>')

              if added:
                  added.sort(key=lambda p: (-cur[p][3], p))
                  lines.append('<details><summary>Added — sorted by install size</summary>\n')
                  lines.append('| size | package | version |')
                  lines.append('|---:|---|---|')
                  for p in added:
                      cv,cr,ce,cs = cur[p]
                      lines.append(f'| {fmt_size_abs(cs)} | `{p}` | {fmt_ver(cv,cr,ce)} |')
                  lines.append('\n</details>')

              if removed:
                  removed.sort(key=lambda p: (-prev[p][3], p))
                  lines.append('<details><summary>Removed — sorted by install size</summary>\n')
                  lines.append('| size | package | version |')
                  lines.append('|---:|---|---|')
                  for p in removed:
                      pv,pr,pe,ps = prev[p]
                      lines.append(f'| {fmt_size_abs(ps)} | `{p}` | {fmt_ver(pv,pr,pe)} |')
                  lines.append('\n</details>')

          text = '\n'.join(lines) + '\n'
          print(text)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(text)
          PY

      - name: Free disk
        if: always()
        run: |
          sudo rm -rf /tmp/rechunked /var/lib/containers/storage 2>/dev/null || true
          df -h

  build-dd:
    name: DD image (${{ matrix.variant }})
    needs: build
    # Run as long as the workflow wasn't cancelled. `needs: build` waits for
    # the whole build matrix, but DD only needs the server images; don't let
    # an unrelated desktop-variant failure skip it. Each leg pulls its own
    # server image from ghcr, so it no-ops/fails only if that one is missing.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [arch-server, cachy-server]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free runner disk space
        run: |
          sudo rm -rf \
              /usr/share/dotnet /usr/share/swift /opt/ghc \
              /usr/local/.ghcup /usr/local/lib/android /opt/hostedtoolcache
          df -h /

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdisk parted btrfs-progs e2fsprogs util-linux zstd podman

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build DD image from the freshly built OCI image
        run: |
          owner="${{ github.repository_owner }}"
          sudo ./installer/build-dd-image.sh \
              --variant "${{ matrix.variant }}" \
              --image "ghcr.io/${owner,,}/cache22-${{ matrix.variant }}:rolling" \
              --out "$PWD"

      - name: Push DD image to ghcr.io
        run: |
          owner="${{ github.repository_owner }}"
          IMG="cache22-${{ matrix.variant }}-bios.raw.zst"
          REPO="ghcr.io/${owner,,}/cache22-${{ matrix.variant }}-dd"
          sudo chmod a+r "$IMG"
          oras push "${REPO}:rolling" \
              --artifact-type application/vnd.cache22.diskimage.v1 \
              --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              "${IMG}:application/octet-stream"
          oras tag "${REPO}:rolling" "iso-$(date -u +%Y-%m-%d)"
          echo "Pushed ${REPO}:rolling"

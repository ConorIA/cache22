title: cache22
description: Immutable, atomic Arch / CachyOS desktop and server, delivered as OCI images via bootc.
remote_theme: just-the-docs/just-the-docs
url: https://cmspam.github.io
baseurl: /cache22

permalink: pretty
exclude:
  - UKI_MIGRATION.md
  - vendor

aux_links:
  GitHub:
    - https://github.com/cmspam/cache22

search_enabled: true
search:
  heading_level: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true
color_scheme: dark

footer_content: "Apache 2.0 · per-machine SB keys, never shared · <a href='https://github.com/cmspam/cache22'>cmspam/cache22</a>"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache
